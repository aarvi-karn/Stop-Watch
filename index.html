<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Stopwatch</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

<div class="container">

    <h1>STOPWATCH</h1>
    <p class="subtitle">Measure Time. Improve Performance.</p>

    <div class="stopwatch-card">

        <div class="icon">
            <i class="fa-solid fa-stopwatch"></i>
        </div>

        <div id="display">
            00:00:00:00
        </div>

        <div class="labels">
            <span>Hours</span>
            <span>Minutes</span>
            <span>Seconds</span>
            <span>Milliseconds</span>
        </div>

        <div class="buttons">

            <button class="start">
                <i class="fa-solid fa-play"></i>
                Start
            </button>

            <button class="pause">
                <i class="fa-solid fa-pause"></i>
                Pause
            </button>

            <button class="reset">
                <i class="fa-solid fa-rotate-right"></i>
                Reset
            </button>

            <button class="lap">
                <i class="fa-regular fa-flag"></i>
                Lap
            </button>

        </div>

        <div class="laps-section">
            <h2>Lap Times</h2>
            <ul id="laps"></ul>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
